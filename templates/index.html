<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knot Instructions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: 'Poppins', sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 auto;
            padding-top: 40px;
        }

        .page-wrap {
            width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .step-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 24px 0;
            text-align: center;
        }

        .card {
            width: 360px;
            height: 360px;
            background-color: #ffffff;
            border-radius: 50%;
            border: 5px solid #ffcc33;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card img {
            max-width: 110%;
            max-height: 110%;
            object-fit: contain;
        }


        .nav-buttons {
            margin-top: 28px;
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            width: 80px;
            height: 80px;
            padding: 0;
            border-radius: 50%;
            border: 3px solid #ffcc33;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-prev {
            background-color: #ffffff;
            color: #ffcc33;
        }

        .btn-next {
            background-color: #ffffff;
            color: #ffcc33;
        }
        
        .btn:hover {
            background-color: #243c6c;
            color: #ffffff;
        }

        .instructions-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 20px;
            padding: 20px 0;
            width: 100%;
            max-width: 1200px;
            scroll-behavior: smooth;
        }
        
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            padding: 80px 0 20px 0; /* Added top padding to maintain vertical position */
        }
        
        .start-button-container {
            width: 360px;
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 28px;
            padding-top: 40px; /* Added padding to compensate for removed title */
        }
        
        .start-btn {
            background-color: #ffffff;
            color: #243c6c;
            font-size: 36px;
            font-weight: 700;
            padding: 40px 80px;
            border-radius: 50px;
            border: 5px solid #ffcc33;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            font-family: 'Poppins', sans-serif;
        }
        
        .start-btn:hover {
            background-color: #243c6c;
            color: #ffffff;
        }

        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .mode-btn {
            background-color: #ffffff;
            color: #243c6c;
            font-size: 28px;
            font-weight: 700;
            padding: 30px 60px;
            border-radius: 20px;
            border: 5px solid #ffcc33;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            font-family: 'Poppins', sans-serif;
            width: 400px;
        }

        .mode-btn:hover {
            background-color: #243c6c;
            color: #ffffff;
        }

        .session-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 40px;
        }

        .session-id-display {
            font-size: 48px;
            font-weight: 700;
            color: #ffcc33;
            background-color: #243c6c;
            padding: 30px 50px;
            border-radius: 20px;
            border: 5px solid #ffcc33;
            letter-spacing: 12px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .session-input {
            font-size: 32px;
            font-weight: 700;
            color: #243c6c;
            background-color: #ffffff;
            padding: 20px 50px;
            border-radius: 15px;
            border: 5px solid #ffcc33;
            text-align: center;
            letter-spacing: 8px;
            font-family: 'Poppins', sans-serif;
            width: 300px;
            outline: none;
            box-sizing: border-box;
        }

        .session-label {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }

        .input-connect-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .connect-btn {
            background-color: #ffcc33;
            color: #243c6c;
            font-size: 28px;
            font-weight: 700;
            padding: 20px 50px;
            border-radius: 15px;
            border: 5px solid #ffcc33;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-family: 'Poppins', sans-serif;
            width: 300px;
        }

        .connect-btn:hover {
            background-color: #243c6c;
            color: #ffffff;
            border-color: #ffcc33;
        }

        .status-message {
            font-size: 18px;
            color: #ffcc33;
            margin-top: 20px;
        }
        
        .instruction-step {
            min-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .knot-title-display {
            font-size: 36px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
        }

        .menu-btn-line {
            width: 30px;
            height: 3px;
            background-color: #ffffff;
            transition: all 0.3s ease;
        }

        .menu-btn:hover .menu-btn-line {
            background-color: #ffcc33;
        }

        .popup-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .popup-menu-content {
            background-color: #243c6c;
            padding: 40px;
            border-radius: 20px;
            border: 5px solid #ffcc33;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            width: 90%;
            position: relative;
        }

        .popup-menu-title {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 10px;
        }

        .popup-menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .popup-menu-option {
            background-color: #ffffff;
            color: #243c6c;
            font-size: 20px;
            font-weight: 700;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #ffcc33;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .popup-menu-option:hover {
            background-color: #ffcc33;
            color: #243c6c;
        }

        .popup-session-id {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #ffcc33;
            text-align: center;
        }

        .popup-session-label {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .popup-session-code {
            font-size: 36px;
            font-weight: 700;
            color: #ffcc33;
            letter-spacing: 8px;
        }

        .close-menu-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #ffffff;
            color: #243c6c;
            font-size: 24px;
            font-weight: 700;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid #ffcc33;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-menu-btn:hover {
            background-color: #ffcc33;
            color: #243c6c;
        }

        .next-knot-step {
            min-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 48px;
        }

        .next-knot-card {
            width: 360px;
            height: 360px;
            background-color: #ffffff;
            border-radius: 50%;
            border: 5px solid #ffcc33;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .next-knot-card button {
            background-color: #243c6c;
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
            padding: 40px 60px;
            border-radius: 50px;
            border: 5px solid #ffcc33;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            font-family: 'Poppins', sans-serif;
        }

        .next-knot-card button:hover {
            background-color: #ffcc33;
            color: #243c6c;
        }

        .knot-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            padding: 40px 0;
        }

        .knot-menu-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .knot-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .knot-option {
            background-color: #ffffff;
            color: #243c6c;
            font-size: 20px;
            font-weight: 700;
            padding: 30px 20px;
            border-radius: 20px;
            border: 5px solid #ffcc33;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }

        .knot-option:hover {
            background-color: #243c6c;
            color: #ffffff;
        }
    </style>
    <script>
        let currentStep = 1;
        let totalSteps = 3;
        let visibleSteps = 0;
        let started = false;
        let selectedKnot = 'single';
        let currentKnotIndex = 0;
        const knotSequence = ['single', 'bowline', 'square'];

        const knotConfig = {
            'single': {
                steps: 3,
                folder: 'single_knot',
                images: ['newstep1.png', 'newstep2.png', 'newstep3.png']
            },
            'bowline': {
                steps: 6,
                folder: 'bowline_knot',
                images: ['bow1.png', 'bow2.png', 'bow3.png', 'bow4.png', 'bow5.png', 'bow6.png']
            },
            'square': {
                steps: 7,
                folder: 'sqaure_knot',
                images: ['sqaure1.png', 'sqaure2.png', 'sqaure3.png', 'square4.png', 'sqaure5.png', 'saqure6.png', 'sqaure7.png']
            },
            'alpine': {
                steps: 3,
                folder: 'alpine_butterfly_loop',
                images: ['alpine1.png', 'alpine2.png', 'alpine3.png']
            }
        };

        // Remote control variables
        let isRemoteMode = false;
        let isDisplayMode = false;
        let sessionId = null;
        let pollingInterval = null;

        // Show mode selection screen
        function showModeSelection() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('mode-screen').style.display = 'flex';
        }

        // Mode selection functions
        function selectMode(mode) {
            document.getElementById('mode-screen').style.display = 'none';
            document.getElementById('session-screen').style.display = 'flex';
            
            if (mode === 'display') {
                isDisplayMode = true;
                createSession();
            } else if (mode === 'remote') {
                isRemoteMode = true;
                document.getElementById('display-session').style.display = 'none';
                document.getElementById('remote-session').style.display = 'flex';
            }
        }

        // Create session for display mode
        async function createSession() {
            try {
                const response = await fetch('/api/session/create', {
                    method: 'POST'
                });
                const data = await response.json();
                sessionId = data.session_id;
                document.getElementById('session-id').textContent = sessionId;
                
                // Start 10-second countdown
                let countdown = 10;
                const countdownElement = document.querySelector('#display-session .status-message');
                countdownElement.textContent = `Starting in ${countdown}...`;
                
                const countdownInterval = setInterval(() => {
                    countdown--;
                    if (countdown > 0) {
                        countdownElement.textContent = `Starting in ${countdown}...`;
                    } else {
                        clearInterval(countdownInterval);
                        document.getElementById('session-screen').style.display = 'none';
                        startInstructions();
                        startPolling();
                    }
                }, 1000);
            } catch (error) {
                console.error('Error creating session:', error);
                document.getElementById('status').textContent = 'Error creating session';
            }
        }

        // Connect to existing session (remote mode)
        async function connectToSession() {
            const inputSessionId = document.getElementById('session-input').value.trim();
            if (!inputSessionId) {
                document.getElementById('status').textContent = 'Please enter a session ID';
                return;
            }

            try {
                const response = await fetch(`/api/session/${inputSessionId}/state`);
                if (response.ok) {
                    sessionId = inputSessionId;
                    document.getElementById('status').textContent = 'Connected!';
                    setTimeout(() => {
                        document.getElementById('session-screen').style.display = 'none';
                        startInstructions();
                        startPolling(); // Enable polling for remote mode too
                    }, 1000);
                } else {
                    document.getElementById('status').textContent = 'Session not found';
                }
            } catch (error) {
                console.error('Error connecting to session:', error);
                document.getElementById('status').textContent = 'Connection error';
            }
        }

        // Polling for both display and remote modes
        function startPolling() {
            if (!sessionId) return;
            
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/session/${sessionId}/state`);
                    const data = await response.json();
                    
                    // Sync state from server
                    if (data.current_knot !== selectedKnot) {
                        selectKnot(data.current_knot);
                    }
                    if (data.current_step !== visibleSteps) {
                        syncToStep(data.current_step);
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 500); // Poll every 500ms
        }

        // Sync to specific step
        function syncToStep(targetStep) {
            while (visibleSteps < targetStep && visibleSteps < totalSteps) {
                visibleSteps++;
                const stepElement = document.getElementById(`step${visibleSteps}`);
                const nextKnotElement = document.getElementById('next-knot-step');
                
                if (stepElement) {
                    stepElement.style.display = 'flex';
                } else if (nextKnotElement && visibleSteps === totalSteps) {
                    nextKnotElement.style.display = 'flex';
                }
                
                if (visibleSteps === totalSteps) {
                    document.getElementById('next-btn').disabled = true;
                }
                document.getElementById('prev-btn').disabled = false;
            }
            
            while (visibleSteps > targetStep && visibleSteps > 1) {
                const stepElement = document.getElementById(`step${visibleSteps}`);
                const nextKnotElement = document.getElementById('next-knot-step');
                
                if (stepElement) {
                    stepElement.style.display = 'none';
                } else if (nextKnotElement) {
                    nextKnotElement.style.display = 'none';
                }
                
                visibleSteps--;
                document.getElementById('next-btn').disabled = false;
                if (visibleSteps === 1) {
                    document.getElementById('prev-btn').disabled = true;
                }
            }
            
            scrollToStep(visibleSteps);
        }

        // Update server state (both remote and display modes)
        async function updateServerState() {
            if (!sessionId) return;
            
            try {
                await fetch(`/api/session/${sessionId}/state`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        current_step: visibleSteps,
                        current_knot: selectedKnot
                    })
                });
            } catch (error) {
                console.error('Error updating state:', error);
            }
        }

        function startInstructions() {
            document.getElementById('start-screen').style.display = 'none';
            started = true;
            selectKnot('single');
        }

        function nextKnot() {
            currentKnotIndex++;
            if (currentKnotIndex < knotSequence.length) {
                selectKnot(knotSequence[currentKnotIndex]);
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('popup-menu');
            if (menu.style.display === 'flex') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'flex';
                // Update session ID in popup menu
                if (sessionId) {
                    document.getElementById('popup-session-id').textContent = sessionId;
                }
            }
        }

        function selectKnotFromMenu(knotType) {
            // Find the index of the selected knot in the sequence
            const index = knotSequence.indexOf(knotType);
            if (index !== -1) {
                currentKnotIndex = index;
            }
            selectKnot(knotType);
            toggleMenu();
        }

        function selectKnot(knotType) {
            selectedKnot = knotType;
            const config = knotConfig[knotType];
            totalSteps = config.steps;
            
            // Update knot title
            const knotTitles = {
                'single': 'Single Knot',
                'bowline': 'Bowline Knot',
                'square': 'Square Knot',
                'alpine': 'Alpine Butterfly Loop'
            };
            document.getElementById('knot-title').textContent = knotTitles[knotType];
            
            // Update images and create/show steps
            const container = document.getElementById('instructions-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= totalSteps; i++) {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'instruction-step';
                stepDiv.id = `step${i}`;
                stepDiv.style.display = 'none';
                stepDiv.innerHTML = `
                    <div class="step-title">Step ${i}</div>
                    <div class="card">
                        <img src="/static/step_img/${config.folder}/${config.images[i-1]}" alt="${knotType} step ${i}">
                    </div>
                `;
                container.appendChild(stepDiv);
            }
            
            // Add Next Knot button for Single Knot and Bowline Knot if not the last knot
            if ((knotType === 'single' || knotType === 'bowline') && currentKnotIndex < knotSequence.length - 1) {
                const nextKnotDiv = document.createElement('div');
                nextKnotDiv.className = 'next-knot-step';
                nextKnotDiv.id = 'next-knot-step';
                nextKnotDiv.style.display = 'none';
                nextKnotDiv.innerHTML = `
                    <div class="next-knot-card">
                        <button onclick="nextKnot()">Next Knot ⮕</button>
                    </div>
                `;
                container.appendChild(nextKnotDiv);
                totalSteps++; // Increment to include the Next Knot step
            }
            
            // Apply special styling for bowline knot - scale up 50% and center
            if (knotType === 'bowline') {
                const style = document.createElement('style');
                style.id = 'knot-specific-style';
                style.textContent = `
                    .instruction-step .card img {
                        max-width: 160%;
                        max-height: 160%;
                        margin-top: 143px;
                    }
                    #step1 .card img {
                        margin-top: 172px;
                    }
                    #step6 .card img {
                        margin-top: 172px;
                    }
                `;
                // Remove existing style if present
                const existingStyle = document.getElementById('knot-specific-style');
                if (existingStyle) existingStyle.remove();
                document.head.appendChild(style);
            } else if (knotType === 'square') {
                // Apply special styling for square knot - step 1 stays at 130%, steps 2-6 get 15% bigger and move down 20%
                const style = document.createElement('style');
                style.id = 'knot-specific-style';
                style.textContent = `
                    .instruction-step .card img {
                        max-width: 130%;
                        max-height: 130%;
                        margin-top: 90px;
                    }
                    #step2 .card img {
                        max-width: 145%;
                        max-height: 145%;
                        margin-top: 140px;
                        margin-left: -10%;
                    }
                    #step3 .card img {
                        max-width: 145%;
                        max-height: 145%;
                        margin-top: 161px;
                    }
                    #step4 .card img,
                    #step5 .card img,
                    #step6 .card img {
                        max-width: 145%;
                        max-height: 145%;
                        margin-top: 182px;
                    }
                    #step7 .card img {
                        max-width: 155%;
                        max-height: 155%;
                        margin-top: 237px;
                        margin-left: -5%;
                    }
                `;
                // Remove existing style if present
                const existingStyle = document.getElementById('knot-specific-style');
                if (existingStyle) existingStyle.remove();
                document.head.appendChild(style);
            } else {
                // Remove knot-specific style if switching to a different knot
                const existingStyle = document.getElementById('knot-specific-style');
                if (existingStyle) existingStyle.remove();
            }
            
            visibleSteps = 0;
            document.getElementById('instruction-content').style.display = 'block';
            document.getElementById('next-btn').disabled = false;
            showNextStep();
        }

        function showNextStep() {
            if (visibleSteps < totalSteps) {
                visibleSteps++;
                const stepElement = document.getElementById(`step${visibleSteps}`);
                const nextKnotElement = document.getElementById('next-knot-step');
                
                if (stepElement) {
                    stepElement.style.display = 'flex';
                } else if (nextKnotElement && visibleSteps === totalSteps) {
                    nextKnotElement.style.display = 'flex';
                }
                
                if (visibleSteps === totalSteps) {
                    document.getElementById('next-btn').disabled = true;
                }
                document.getElementById('prev-btn').disabled = false;
                scrollToStep(visibleSteps);
                
                // Update server state if in remote mode
                updateServerState();
            }
        }

        function showPrevStep() {
            if (visibleSteps > 1) {
                visibleSteps--;
                scrollToStep(visibleSteps);
                document.getElementById('next-btn').disabled = false;
                if (visibleSteps === 1) {
                    document.getElementById('prev-btn').disabled = true;
                }
                
                // Update server state if in remote mode
                updateServerState();
            }
        }

        function scrollToStep(step) {
            let stepElement = document.getElementById(`step${step}`);
            
            // If regular step doesn't exist, check for next-knot-step
            if (!stepElement) {
                stepElement = document.getElementById('next-knot-step');
            }
            
            const container = document.getElementById('instructions-container');
            
            if (stepElement && container) {
                // Calculate the scroll position
                const scrollLeft = stepElement.offsetLeft - container.offsetLeft;
                
                // Smooth scroll to the step
                container.scrollTo({
                    left: scrollLeft,
                    behavior: 'smooth'
                });
            }
        }

        window.onload = function() {
            // Initialize: hide instruction content and knot menu
            document.getElementById('instruction-content').style.display = 'none';
            document.getElementById('knot-menu-screen').style.display = 'none';
        };
    </script>
</head>
<body>
    <div class="container">
        
        <div id="start-screen" class="start-screen">
            <div class="start-button-container">
                <button class="start-btn" onclick="showModeSelection()">START</button>
            </div>
        </div>

        <div id="mode-screen" class="start-screen" style="display: none;">
            <div class="mode-selection">
                <button class="mode-btn" onclick="selectMode('display')">Gameplay Mode</button>
                <button class="mode-btn" onclick="selectMode('remote')">Remote Control</button>
            </div>
        </div>

        <div id="session-screen" class="session-screen">
            <div id="display-session">
                <div class="session-label">Your Session ID:</div>
                <div class="session-id-display" id="session-id">----</div>
                <div class="status-message">Starting in 3 seconds...</div>
            </div>
            
            <div id="remote-session" style="display: none; flex-direction: column; align-items: center;">
                <div class="session-label">Enter Session ID:</div>
                <div class="input-connect-row">
                    <input type="text" class="session-input" id="session-input" maxlength="4" placeholder="0000">
                    <button class="connect-btn" onclick="connectToSession()">Connect</button>
                </div>
                <div class="status-message" id="status"></div>
            </div>
        </div>
        
        <div id="knot-menu-screen" class="knot-menu">
            <div class="knot-menu-title">Select a Knot</div>
            <div class="knot-options">
                <button class="knot-option" onclick="selectKnot('single')">Single Knot</button>
                <button class="knot-option" onclick="selectKnot('square')">Square Knot</button>
                <button class="knot-option" onclick="selectKnot('bowline')">Bowline Knot</button>
                <button class="knot-option" onclick="selectKnot('alpine')">Alpine Butterfly Loop</button>
            </div>
        </div>
        
        <div id="instruction-content">
            <div class="knot-title-display">
                <button class="menu-btn" onclick="toggleMenu()">
                    <div class="menu-btn-line"></div>
                    <div class="menu-btn-line"></div>
                    <div class="menu-btn-line"></div>
                </button>
                <span id="knot-title">Single Knot</span>
            </div>
            <div class="instructions-container" id="instructions-container">
                <div class="instruction-step" id="step1">
                    <div class="step-title">Step 1</div>
                    <div class="card">
                        <img src="{{ url_for('static', filename='step_img/single_knot/newstep1.png') }}" alt="Single knot step 1">
                    </div>
                </div>
                <div class="instruction-step" id="step2">
                    <div class="step-title">Step 2</div>
                    <div class="card">
                        <img src="{{ url_for('static', filename='step_img/single_knot/newstep2.png') }}" alt="Single knot step 2">
                    </div>
                </div>
                <div class="instruction-step" id="step3">
                    <div class="step-title">Step 3</div>
                    <div class="card">
                        <img src="{{ url_for('static', filename='step_img/single_knot/newstep3.png') }}" alt="Single knot step 3">
                    </div>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="btn btn-prev" id="prev-btn" onclick="showPrevStep()">←</button>
                <button class="btn btn-next" id="next-btn" onclick="showNextStep()">→</button>
            </div>
        </div>

        <div id="popup-menu" class="popup-menu">
            <div class="popup-menu-content">
                <button class="close-menu-btn" onclick="toggleMenu()">✕</button>
                <div class="popup-menu-title">Select a Knot</div>
                <div class="popup-menu-options">
                    <button class="popup-menu-option" onclick="selectKnotFromMenu('single')">Single Knot</button>
                    <button class="popup-menu-option" onclick="selectKnotFromMenu('bowline')">Bowline Knot</button>
                    <button class="popup-menu-option" onclick="selectKnotFromMenu('square')">Square Knot</button>
                </div>
                <div class="popup-session-id">
                    <div class="popup-session-label">Session ID:</div>
                    <div class="popup-session-code" id="popup-session-id">----</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
